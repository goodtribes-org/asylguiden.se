apiVersion: apps/v1
kind: Deployment
metadata:
  name: asylguiden-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "asylguiden.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  replicas: {{ .Values.postgres.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "asylguiden.selectorLabels" "postgres" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "asylguiden.selectorLabels" "postgres" | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            {{- range $key, $value := .Values.postgres.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.env.POSTGRES_USER | default "asylguiden" }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.env.POSTGRES_USER | default "asylguiden" }}
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: asylguiden-postgres
        - name: init-db
          configMap:
            name: asylguiden-init-db
