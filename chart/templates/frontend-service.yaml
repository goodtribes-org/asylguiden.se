apiVersion: v1
kind: Service
metadata:
  name: asylguiden-frontend
  labels:
    {{- include "asylguiden.labels" . | nindent 4 }}
    app.kubernetes.io/name: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "asylguiden.selectorLabels" "frontend" | nindent 4 }}
