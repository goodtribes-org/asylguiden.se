apiVersion: v1
kind: Service
metadata:
  name: asylguiden-backend
  labels:
    {{- include "asylguiden.labels" . | nindent 4 }}
    app.kubernetes.io/name: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 1337
      protocol: TCP
  selector:
    {{- include "asylguiden.selectorLabels" "backend" | nindent 4 }}
