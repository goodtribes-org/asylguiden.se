namespace: asylguiden

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/goodtribes-org/asylguiden.se/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    NEXT_PUBLIC_STRAPI_URL: http://asylguiden-backend:1337
    STRAPI_API_TOKEN: ""
    NEXT_PUBLIC_MEILI_HOST: http://asylguiden-meilisearch:7700
    NEXT_PUBLIC_MEILI_SEARCH_KEY: ""
    NEXTAUTH_URL: https://asylguiden.se
    NEXTAUTH_SECRET: changeme

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/goodtribes-org/asylguiden.se/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 1337
  env:
    HOST: "0.0.0.0"
    PORT: "1337"
    APP_KEYS: key1,key2,key3,key4
    API_TOKEN_SALT: changeme
    ADMIN_JWT_SECRET: changeme
    TRANSFER_TOKEN_SALT: changeme
    JWT_SECRET: changeme
    DATABASE_CLIENT: postgres
    DATABASE_HOST: asylguiden-postgres
    DATABASE_PORT: "5432"
    DATABASE_NAME: asylguiden
    DATABASE_SSL: "false"
    MEILI_HOST: http://asylguiden-meilisearch:7700

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
  env: {}
  persistence:
    size: 5Gi
    storageClass: ""

meilisearch:
  replicaCount: 1
  image:
    repository: getmeili/meilisearch
    tag: v1.6
    pullPolicy: IfNotPresent
  service:
    port: 7700
  env:
    MEILI_ENV: production
  persistence:
    size: 5Gi
    storageClass: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: http
    acme.cert-manager.io/http01-edit-in-place: "true"
    kubernetes.io/ingress.class: traefik
    kubernetes.io/tls-acme: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
  hosts:
    - asylguiden.se
    - www.asylguiden.se
  tls:
    - secretName: asylguiden-tls
      hosts:
        - asylguiden.se
        - www.asylguiden.se

collector:
  image:
    repository: ghcr.io/goodtribes-org/asylguiden.se/collector
    tag: latest
    pullPolicy: IfNotPresent
  strapiApiToken: ""
  logLevel: info
  schedules:
    # Staggered every Monday UTC to avoid concurrent API calls
    scb: "0 6 * * 1"
    unhcr: "0 7 * * 1"
    eurostat: "0 8 * * 1"
    frontex: "0 9 * * 1"
    migrationsverket: "0 10 * * 1"
    migrationsverket-excel: "0 11 * * 1"

imagePullSecrets:
  - name: ghcr-pull-secret
